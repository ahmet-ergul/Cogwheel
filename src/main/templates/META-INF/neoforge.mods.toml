modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

# Client-side only: this flag tells the server-handshake to ignore us so vanilla servers
# (and modded servers without Cogwheel) accept clients that have us installed.
displayTest="IGNORE_ALL_SERVERS"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="CLIENT"

# Create is OPTIONAL: Cogwheel works without it but unlocks its rich processing-recipe adapter
# when present.
[[dependencies.${mod_id}]]
    modId="create"
    type="optional"
    versionRange="[6.0.10,)"
    ordering="AFTER"
    side="CLIENT"
